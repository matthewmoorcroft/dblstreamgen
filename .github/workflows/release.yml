name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install "hatch==1.13.0" "click<8.3"
      - run: hatch build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write  # required for OIDC PyPI publish
      contents: write  # required to attach artifacts to the GitHub release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Attach wheel to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
