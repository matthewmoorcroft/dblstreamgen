# dblstreamgen v0.4 Configuration Example
#
# Web analytics events: page views, clicks, purchases.
# Demonstrates the core v0.4 format: scenario section, float weights,
# serialization config, and native timestamp ranges.

generation_mode: "streaming"

scenario:
  seed: 42
  duration_seconds: 300
  baseline_rows_per_second: 1000

serialization:
  format: "json"
  partition_key_field: "event_key"

# ============================================================================
# SCHEMA
# ============================================================================

# Common fields appear in ALL event types
common_fields:
  event_name:
    event_type_id: true  # Populated from event_type_id values

  event_key:
    type: "string"
    values: ["user_1", "user_2", "user_3", "user_4", "user_5",
             "user_6", "user_7", "user_8", "user_9", "user_10"]

  event_timestamp:
    type: "timestamp"
    begin: "2024-01-01 00:00:00"
    end: "2024-12-31 23:59:59"
    random: true

  event_id:
    type: "uuid"

  session_id:
    type: "uuid"

# Event type weights must sum to 1.0
event_types:
  # Page view events (60% of traffic)
  - event_type_id: "user.page_view"
    weight: 0.60
    fields:
      page_url:
        type: "string"
        values: ["/home", "/products", "/cart", "/checkout", "/about"]
        weights: [40, 30, 15, 10, 5]
      referrer:
        type: "string"
        values: ["direct", "google", "facebook", "email", "other"]
        weights: [30, 35, 15, 10, 10]
      user_id:
        type: "int"
        range: [1, 1000000]

  # Click events (30% of traffic)
  - event_type_id: "user.click"
    weight: 0.30
    fields:
      element_id:
        type: "string"
        values: ["btn_buy", "btn_add_cart", "link_product", "btn_search", "link_footer"]
        weights: [25, 30, 25, 15, 5]
      element_type:
        type: "string"
        values: ["button", "link", "image"]
        weights: [50, 40, 10]
      user_id:
        type: "int"
        range: [1, 1000000]

  # Purchase events (10% of traffic)
  - event_type_id: "user.purchase"
    weight: 0.10
    fields:
      transaction_id:
        type: "uuid"
      amount:
        type: "float"
        range: [10.0, 500.0]
      product_count:
        type: "int"
        range: [1, 10]
      user_id:
        type: "int"
        range: [1, 1000000]
